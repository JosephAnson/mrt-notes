name: Docker

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mrt-notes:latest
          build-args: |
            REDIS_HOST=${{ env.REDIS_HOST }}
            REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}
            GOOGLE_ADSENSE_ID=${{ env.GOOGLE_ADSENSE_ID }}
            BLIZZARD_CLIENT_ID=${{ env.BLIZZARD_CLIENT_ID }}
            BLIZZARD_CLIENT_SECRET=${{ env.BLIZZARD_CLIENT_SECRET }}
            SUPABASE_URL=${{ env.SUPABASE_URL }}
            SUPABASE_KEY=${{ env.SUPABASE_KEY }}
